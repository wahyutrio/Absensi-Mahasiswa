<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absensi Mahasiswa - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        .login-header h2 {
            margin: 0;
            font-weight: 600;
        }
        
        .login-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }
        
        .login-body {
            padding: 2rem;
        }
        
        .form-floating {
            margin-bottom: 1rem;
        }
        
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .form-select {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 0.75rem;
            transition: all 0.3s ease;
        }
        
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .alert {
            border-radius: 10px;
            border: none;
        }
        
        .loading {
            display: none;
        }
        
        .loading.show {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-graduation-cap fa-3x mb-3"></i>
                <h2>Sistem Absensi</h2>
                <p>Universitas Nahdlatul Ulama Kalbar</p>
            </div>
            <div class="login-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="userType" class="form-label">Masuk Sebagai</label>
                        <select class="form-select" id="userType" required>
                            <option value="">Pilih Tipe User</option>
                            <option value="mahasiswa">Mahasiswa</option>
                            <option value="dosen">Dosen</option>
                            <option value="staf_akademik">Staf Akademik</option>
                        </select>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="username" placeholder="name@example.com" required>
                        <label for="username">Email</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>
                    
                    <div id="alertContainer"></div>
                    
                    <button type="submit" class="btn btn-primary btn-login">
                        <span class="loading spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        <span class="btn-text">Masuk</span>
                    </button>
                </form>
                
                <div class="mt-4 text-center">
                    <small class="text-muted">
                        <strong>Demo Credentials:</strong><br>
                        Mahasiswa: gunakan email mahasiswa<br>
                        Dosen: gunakan email dosen<br>
                        Staf: admin / admin123
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Konfigurasi API
        const API_BASE_URL = 'http://localhost/absensi_system/backend/api';
        
        // Form login handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userType = document.getElementById('userType').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Validasi input
            if (!userType || !username || !password) {
                showAlert('Semua field harus diisi!', 'danger');
                return;
            }
            
            // Show loading
            toggleLoading(true);
            
            try {
                const response = await fetch(`${API_BASE_URL}/login.php`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_type: userType,
                        username: username,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Simpan data user ke localStorage
                    localStorage.setItem('user_data', JSON.stringify(result.user_data));
                    localStorage.setItem('user_type', result.user_type);
                    
                    showAlert('Login berhasil! Mengalihkan...', 'success');
                    
                    // Redirect berdasarkan tipe user
                    setTimeout(() => {
                        switch(result.user_type) {
                            case 'mahasiswa':
                                window.location.href = 'dashboard_mahasiswa.html';
                                break;
                            case 'dosen':
                                window.location.href = 'dashboard_dosen.html';
                                break;
                            case 'staf_akademik':
                                window.location.href = 'dashboard_admin.html';
                                break;
                        }
                    }, 1500);
                } else {
                    showAlert(result.message, 'danger');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Terjadi kesalahan koneksi. Pastikan server backend berjalan.', 'danger');
            } finally {
                toggleLoading(false);
            }
        });
        
        // Function untuk menampilkan alert
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
        }
        
        // Function untuk toggle loading state
        function toggleLoading(show) {
            const loading = document.querySelector('.loading');
            const btnText = document.querySelector('.btn-text');
            const submitBtn = document.querySelector('.btn-login');
            
            if (show) {
                loading.classList.add('show');
                btnText.textContent = 'Memproses...';
                submitBtn.disabled = true;
            } else {
                loading.classList.remove('show');
                btnText.textContent = 'Masuk';
                submitBtn.disabled = false;
            }
        }
        
        // Auto-fill untuk demo (opsional)
        document.getElementById('userType').addEventListener('change', function() {
            const userType = this.value;
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            
            // Auto-fill untuk demo
            if (userType === 'staf_akademik') {
                usernameField.value = 'admin';
                passwordField.value = 'admin123';
            } else {
                usernameField.value = '';
                passwordField.value = '';
            }
        });
    </script>
</body>
</html>
